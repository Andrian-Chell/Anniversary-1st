<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Anniversary! 💕</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        /* Confetti Canvas */
        #confettiCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .anniversary-title {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(2.5rem, 8vw, 6rem);
            background: linear-gradient(45deg, #ff6b6b, #ffd93d, #6bcf7f, #4ecdc4);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease infinite, float 6s ease-in-out infinite;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            margin-bottom: 10px;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        /* Sections */
        .section {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 30px;
            margin: 20px 0;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.3s ease;
        }

        .section:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
        }

        /* Personalized Message */
        .personalized-message {
            text-align: center;
        }

        .message-input {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            font-size: 1.3rem;
            font-family: 'Dancing Script', cursive;
            border: 3px dashed #ff6b6b;
            border-radius: 20px;
            background: rgba(255,255,255,0.8);
            text-align: center;
            resize: vertical;
            min-height: 120px;
        }

        /* Candle */
        .candle-container {
            text-align: center;
            position: relative;
        }

        .candle {
            width: 80px;
            height: 200px;
            margin: 0 auto;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .candle:hover {
            transform: scale(1.05);
        }

        .candle-body {
            width: 100%;
            height: 70%;
            background: linear-gradient(to bottom, #ff8c42, #e67e22);
            border-radius: 40px 40px 10px 10px;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .candle-flame {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 40px;
            background: radial-gradient(circle, #ffd700 20%, #ff4500 70%, transparent 100%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            animation: flicker 0.5s infinite alternate;
            transition: opacity 0.5s ease;
        }

        .candle.blow-out .candle-flame {
            opacity: 0;
        }

        .surprise {
            display: none;
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: #ff6b6b;
            animation: bounce 1s infinite;
            margin-top: 20px;
        }

        .candle.blow-out .surprise {
            display: block;
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1) rotate(-1deg); }
            100% { transform: translateX(-50%) scale(1.1) rotate(1deg); }
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Music Player */
        .music-player {
            text-align: center;
        }

        .music-btn {
            background: linear-gradient(45deg, #ff6b6b, #ffd93d);
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255,107,107,0.4);
            transition: all 0.3s ease;
        }

        .music-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(255,107,107,0.6);
        }

        .music-btn.playing {
            background: linear-gradient(45deg, #6bcf7f, #4ecdc4);
        }

        /* Countdown Timer */
        .countdown {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .countdown-circle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d);
            color: white;
            border-radius: 50%;
            font-size: 1.8rem;
            font-weight: 700;
            margin: 0 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
            50% { box-shadow: 0 0 40px rgba(255,107,107,0.8); }
            100% { box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        }

        /* Gallery */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            aspect-ratio: 1;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .gallery-item:hover {
            transform: scale(1.05) rotate(2deg);
        }

        .file-input {
            display: none;
        }

        .add-photo-btn {
            grid-column: 1 / -1;
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-photo-btn:hover {
            transform: scale(1.05);
        }

        /* Guestbook */
        .guestbook {
            max-height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: rgba(255,255,255,0.5);
            border-radius: 20px;
        }

        .guestbook-entry {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            padding: 15px;
            background: white;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .sticker {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .sticker:hover {
            transform: scale(1.2) rotate(10deg);
        }

        .guest-message {
            flex: 1;
        }

        .message-input-guest, .name-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ff6b6b;
            border-radius: 10px;
            margin-bottom: 10px;
            font-family: inherit;
        }

        /* Gift */
        .gift-container {
            text-align: center;
            perspective: 1000px;
        }

        .gift-box {
            width: 200px;
            height: 200px;
            margin: 0 auto;
            position: relative;
            cursor: pointer;
            transition: all 0.5s ease;
            transform-style: preserve-3d;
        }

        .gift-box.opening {
            animation: unwrap 2s ease forwards;
        }

        .gift-box-inner {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.8s ease;
        }

        .gift-lid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(45deg, #ff6b6b, #ffd93d);
            border-radius: 15px 15px 0 0;
            transform-origin: bottom;
        }

        .gift-body {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            border-radius: 0 0 15px 15px;
        }

        .gift-content {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Dancing Script', cursive;
            font-size: 1.5rem;
            color: #ff6b6b;
            text-align: center;
            animation: bounce 1s infinite;
        }

        .gift-box.open .gift-content {
            display: block;
        }

        @keyframes unwrap {
            0% { transform: rotateY(0deg); }
            50% { transform: rotateY(180deg) scale(1.1); }
            100% { transform: rotateY(360deg) scale(1); }
        }

        /* Fireworks Canvas */
        #fireworksCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .section {
                padding: 20px;
                margin: 15px 0;
            }
        }

        /* Scrollbar */
        .guestbook::-webkit-scrollbar {
            width: 8px;
        }

        .guestbook::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
        }

        .guestbook::-webkit-scrollbar-thumb {
            background: linear-gradient(45deg, #ff6b6b, #ffd93d);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <canvas id="confettiCanvas"></canvas>
    <canvas id="fireworksCanvas"></canvas>
    
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1 class="anniversary-title">Happy Anniversary! 💕</h1>
            <p style="font-size: 1.2rem; color: #666;">Click around and celebrate your special day! 🎉</p>
        </div>

        <!-- Music Player -->
        <div class="section music-player">
            <button class="music-btn" id="musicBtn">🎵 Play Celebration Music</button>
            <audio id="celebrationMusic" loop>
                <source src="data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSq+0/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSq+0/" type="audio/wav">
            </audio>
        </div>

        <!-- Personalized Message -->
        <div class="section personalized-message">
            <h2 style="font-family: 'Dancing Script', cursive; font-size: 2rem; color: #ff6b6b; margin-bottom: 20px;">💌 Your Love Message</h2>
            <textarea class="message-input" placeholder="Write your special anniversary message here... 'To my forever love, every moment with you is magic...' 💖" id="personalMessage"></textarea>
        </div>

        <!-- Candle -->
        <div class="section candle-container">
            <h2 style="font-family: 'Dancing Script', cursive; font-size: 2rem; color: #ff6b6b; margin-bottom: 20px;">🕯️ Make a Wish!</h2>
            <div class="candle" id="candle">
                <div class="candle-body"></div>
                <div class="candle-flame"></div>
                <div class="surprise">✨ Your wish has come true! 💕</div>
            </div>
            <p style="margin-top: 20px; font-style: italic;">Click and blow out the candle!</p>
        </div>

        <!-- Countdown Timer -->
        <div class="section countdown">
            <h2 style="font-family: 'Dancing Script', cursive; font-size: 2rem; color: #ff6b6b; margin-bottom: 20px;">⏰ Countdown to Your Special Moment</h2>
            <div id="countdownDisplay">
                <div class="countdown-circle" id="days">00</div>
                <div style="font-size: 1.5rem; color: #666; margin: 0 20px;">Days</div>
                <div class="countdown-circle" id="hours">00</div>
                <div style="font-size: 1.5rem; color: #666; margin: 0 20px;">Hours</div>
                <div class="countdown-circle" id="minutes">00</div>
                <div style="font-size: 1.5rem; color: #666; margin: 0 20px;">Minutes</div>
                <div class="countdown-circle" id="seconds">00</div>
            </div>
        </div>

        <!-- Memories Gallery -->
        <div class="section">
            <h2 style="font-family: 'Dancing Script', cursive; font-size: 2rem; color: #ff6b6b; margin-bottom: 20px; text-align: center;">📸 Shared Memories</h2>
            <div class="gallery" id="gallery">
                <button class="add-photo-btn" id="addPhotoBtn">➕ Add a Memory Photo</button>
            </div>
            <input type="file" id="fileInput" class="file-input" accept="image/*" multiple>
        </div>

        <!-- Guestbook -->
        <div class="section">
            <h2 style="font-family: 'Dancing Script', cursive; font-size: 2rem; color: #ff6b6b; margin-bottom: 20px; text-align: center;">💌 Guestbook <span id="entryCount">(0/10)</span></h2>
            <div class="guestbook" id="guestbook">
                <!-- Entries will be added here -->
            </div>
            <div style="margin-top: 20px;">
                <input type="text" class="name-input" id="guestName" placeholder="Your name 💕">
                <input type="text" class="message-input-guest" id="
